services:
  mongodb:
    image: mongo:latest
    container_name: habittrack-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mongodb-test:
    image: mongo:latest
    container_name: habittrack-mongo-test
    ports:
      - "27018:27017"
    volumes:
      - mongo-test-data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: habittrack-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=pass
    depends_on:
      - mongodb

volumes:
  mongo-data:
  mongo-test-data:
